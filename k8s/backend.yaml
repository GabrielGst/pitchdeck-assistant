apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitchdeck-backend
  namespace: pitchdeck-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pitchdeck-backend
  template:
    metadata:
      labels:
        app: pitchdeck-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/gabrielgst/pitchdeck-assistant/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: pitchdeck-secrets
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pitchdeck-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+asyncpg://pitchdeck:$(POSTGRES_PASSWORD)@pitchdeck-postgres:5432/pitchdeck
            - name: DATABASE_URL_SYNC
              value: postgresql://pitchdeck:$(POSTGRES_PASSWORD)@pitchdeck-postgres:5432/pitchdeck
            - name: REDIS_URL
              value: redis://pitchdeck-redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://pitchdeck-redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://pitchdeck-redis:6379/1
            - name: LANGFUSE_HOST
              value: https://pitchdeck-langfuse.webagab.fr
            - name: ENVIRONMENT
              value: production
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: pitchdeck-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: pitchdeck-backend
  namespace: pitchdeck-prod
spec:
  selector:
    app: pitchdeck-backend
  ports:
    - port: 8000
      targetPort: 8000
