server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name template.webagab.fr;
    
    # --- Authentication ---
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-mkdocs;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/webagab.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webagab.fr/privkey.pem;

    include snippets/ssl-hardening.conf;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN                                      always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "same-origin"                                   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # --- Proxy to Vaultwarden container ---
    location / {
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_buffers     4 16k;
        proxy_buffer_size 16k;

        proxy_pass http://127.0.0.1:5010;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

}
