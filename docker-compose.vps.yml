name: pitchdeck-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pitchdeck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pitchdeck
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchdeck"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/gabrielgst/pitchdeck-assistant/backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://pitchdeck:${POSTGRES_PASSWORD}@postgres:5432/pitchdeck
      DATABASE_URL_SYNC: postgresql://pitchdeck:${POSTGRES_PASSWORD}@postgres:5432/pitchdeck
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LANGFUSE_HOST: https://pitchdeck-langfuse.webagab.fr
      ENVIRONMENT: production
    env_file:
      - .env.prod
    volumes:
      - uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  celery-worker:
    image: ghcr.io/gabrielgst/pitchdeck-assistant/backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://pitchdeck:${POSTGRES_PASSWORD}@postgres:5432/pitchdeck
      DATABASE_URL_SYNC: postgresql://pitchdeck:${POSTGRES_PASSWORD}@postgres:5432/pitchdeck
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENVIRONMENT: production
    env_file:
      - .env.prod
    volumes:
      - uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  frontend:
    image: ghcr.io/gabrielgst/pitchdeck-assistant/frontend:latest
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NODE_ENV: production
    env_file:
      - .env.prod
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
  uploads_prod:
